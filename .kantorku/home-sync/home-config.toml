# =====================================================
# HOME-CONFIG.TOML — Baseline Configuration
# This is the reference baseline for ~/.kantorku/config.toml
# The guard system uses this to detect config drift.
# =====================================================

[office]
conductor_model = "ollama/llama3"

# ─────────────────────────────────────
# TRANSLATION LAYER — cheap & fast
# ─────────────────────────────────────

[workers.intake]
category = "translation"
subcategory = "input"
model = "ollama/llama3"

[workers.narrator]
category = "translation"
subcategory = "output"
model = "ollama/llama3"

# ─────────────────────────────────────
# CODING — 3 SPECIALIZATIONS
# ─────────────────────────────────────

[workers.coder_frontend]
category = "coding"
subcategory = "frontend"
model = "ollama/llama3"
squad = "coding"
role = "Frontend specialist"

[workers.coder_backend]
category = "coding"
subcategory = "backend"
model = "ollama/llama3"
squad = "coding"
role = "Python/Rust/Systems specialist"

[workers.coder_wiring]
category = "coding"
subcategory = "integration"
model = "ollama/llama3"
squad = "coding"
role = "API/Integration specialist"

# ─────────────────────────────────────
# VERIFICATION — 2 SPECIALIZATIONS
# ─────────────────────────────────────

[workers.verifier_designer]
category = "verification"
subcategory = "visual"
model = "ollama/llama3"
squad = "verification"
role = "Visual/UX judge"

[workers.verifier_engineer]
category = "verification"
subcategory = "engineering"
model = "ollama/llama3"
squad = "verification"
role = "Logic/test/security reviewer"

# ─────────────────────────────────────
# CONTEXT POOL
# ─────────────────────────────────────

[pool]
model = "ollama/llama3"
instances = 2
queue_type = "fifo"

# ─────────────────────────────────────
# SUPPORT — 6 SPECIALIZATIONS
# ─────────────────────────────────────

[workers.debugger]
category = "support"
subcategory = "debugging"
model = "ollama/llama3"
squad = "support"
role = "Root cause analysis"

[workers.scout]
category = "support"
subcategory = "research"
model = "ollama/llama3"
squad = "support"
role = "Research, real-time search"

[workers.auditor]
category = "support"
subcategory = "review"
model = "ollama/llama3"
squad = "support"
role = "Code review, architecture"

[workers.scribe]
category = "support"
subcategory = "documentation"
model = "ollama/llama3"
squad = "support"
role = "Documentation"

[workers.summarizer]
category = "support"
subcategory = "compression"
model = "ollama/llama3"
squad = "support"
role = "Context compression"

[workers.sentinel]
category = "support"
subcategory = "monitoring"
model = "ollama/llama3"
squad = "support"
role = "Error logging"

# ─────────────────────────────────────
# PROVIDERS
# ─────────────────────────────────────

[providers.ollama]
base_url = "http://localhost:11434/v1"

# ─────────────────────────────────────
# MEMORY — Three-Ring System
# ─────────────────────────────────────

[memory]
ring1_path = "data/ring1.duckdb"
ring2_path = "data/ring2.db"
ring3_enabled = false
ring3_path = "data/ring3"

# ─────────────────────────────────────
# SERVER
# ─────────────────────────────────────

[server]
host = "0.0.0.0"
port = 8000
