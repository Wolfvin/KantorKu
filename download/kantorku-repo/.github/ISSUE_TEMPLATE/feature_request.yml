name: Feature Request
description: Suggest a new feature or enhancement / Usulkan fitur baru atau peningkatan
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please fill out the sections below.
        Terima kasih telah mengusulkan fitur! Silakan isi bagian-bagian di bawah ini.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Masalah
      description: |
        What problem does this feature solve? Is your feature request related to a problem?
        Masalah apa yang diselesaikan fitur ini? Apakah permintaan fitur Anda terkait dengan masalah?
      placeholder: "e.g., I'm always frustrated when I have to manually restart workers after a provider failure"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution / Solusi yang Diusulkan
      description: |
        Describe the solution you'd like.
        Jelaskan solusi yang Anda inginkan.
      placeholder: "e.g., Auto-retry with exponential backoff for failed provider requests"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered / Alternatif yang Dipertimbangkan
      description: |
        What other solutions have you considered?
        Solusi lain apa yang telah Anda pertimbangkan?
      placeholder: "e.g., I considered using a different provider, but that doesn't solve the core issue"

  - type: dropdown
    id: component
    attributes:
      label: Component / Komponen
      description: Which part of KantorKu would this affect?
      options:
        - framework (Python backend)
        - interface (Next.js frontend)
        - cli (Node.js CLI)
        - workers
        - server/API
        - memory/context
        - documentation
        - other
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use Case / Kasus Penggunaan
      description: |
        Describe a real-world scenario where this feature would be useful.
        Jelaskan skenario dunia nyata di mana fitur ini akan berguna.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context / Konteks Tambahan
      description: Any other context, mockups, or references.
