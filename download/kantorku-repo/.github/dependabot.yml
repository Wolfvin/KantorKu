version: 2
updates:
  # Python dependencies
  - package-ecosystem: pip
    directory: "/framework"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"

  # Node.js dependencies (Interface)
  - package-ecosystem: npm
    directory: "/interface"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "node"

  # Node.js dependencies (CLI)
  - package-ecosystem: npm
    directory: "/cli"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "node"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
