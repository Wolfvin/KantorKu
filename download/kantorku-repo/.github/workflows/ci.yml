name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python Backend ──
  python-lint:
    name: Python Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      - name: Lint with Ruff
        working-directory: framework
        run: ruff check .

  python-test:
    name: Python Tests (pytest)
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: framework
        run: |
          pip install -e ".[dev,all]"
      - name: Run tests
        working-directory: framework
        run: pytest --tb=short -q
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: framework/htmlcov/

  # ── Next.js Frontend ──
  node-lint:
    name: Node Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: interface/package-lock.json
      - name: Install dependencies
        working-directory: interface
        run: npm ci
      - name: Lint
        working-directory: interface
        run: npm run lint

  node-build:
    name: Node Build (Next.js)
    runs-on: ubuntu-latest
    needs: node-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: interface/package-lock.json
      - name: Install dependencies
        working-directory: interface
        run: npm ci
      - name: Build
        working-directory: interface
        run: npm run build

  # ── CLI ──
  cli-lint:
    name: CLI Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cli/package-lock.json
      - name: Install dependencies
        working-directory: cli
        run: npm ci
      - name: Lint
        working-directory: cli
        run: npm run lint --if-present
      - name: Build
        working-directory: cli
        run: npm run build --if-present
