# =====================================================
# KANTORKU.TOML — WORKER MODEL ASSIGNMENT
# Verified: April 2026 | Multi-source benchmarks
#
# KATEGORISASI WORKER:
#   🟦 coding       → Yang nulis kode (frontend, backend, wiring)
#   🟩 verification → Yang cek & verifikasi (design_judge, logic_judge)
#   🟧 support      → Yang bantuan & analisis (debugger, scout, dll)
#   🟪 translation  → Yang parse & format (intake, narrator)
# =====================================================

[office]
conductor_model = "anthropic/claude-opus-4-6"
# CEO/Manager — Decision-making + orchestration only
# SWE-bench 80.8% | Arena Elo #2 (1095)
# Expensive ($5/M) but low frequency usage

# ─────────────────────────────────────
# 🟪 TRANSLATION LAYER — murah & cepat
# Intake: parse pesan client
# Narrator: format output buat client
# ─────────────────────────────────────

[workers.intake]
category = "translation"
subcategory = "input"
model = "ollama/llama3"
# Parsing only — tidak butuh frontier model

[workers.narrator]
category = "translation"
subcategory = "output"
model = "ollama/llama3"
# Format output only — tidak butuh frontier model

# ─────────────────────────────────────
# 🟦 CODING — 3 SPESIALISASI
# Frontend: UI/Visual (Claude Sonnet)
# Backend: Server/Systems (MiniMax M2.7)
# Wiring: Integration/Glue (Codex 5.3)
# ─────────────────────────────────────

[workers.coder_frontend]
category = "coding"
subcategory = "frontend"
model = "anthropic/claude-sonnet-4-6"
squad = "coding"
role = "React/CSS/UI/Visual specialist"
# WebDev Arena Elo: top 3
# $1.50/M — reasonable untuk frontend quality

[workers.coder_backend]
category = "coding"
subcategory = "backend"
model = "minimax/minimax-m2-7"
squad = "coding"
role = "Python/Rust/Systems specialist"
# SWE-bench Pro 56.2% — #1 open-weight
# $0.30/M — 16x cheaper than Claude Opus

[workers.coder_wiring]
category = "coding"
subcategory = "integration"
model = "google/gemini-3-1-pro"
squad = "coding"
role = "API/WS/MCP/Glue specialist"
# BFCL tool calling: 99.3 score (#1 tie)
# 1M context — see entire codebase when wiring

# ─────────────────────────────────────
# 🟩 VERIFICATION — 2 SPESIALISASI
# Designer: Cek visual/UX (Gemini — multimodal)
# Engineer: Cek logic/security (MiniMax — murah & akurat)
# ─────────────────────────────────────

[workers.verifier_designer]
category = "verification"
subcategory = "visual"
model = "google/gemini-3-1-pro"
squad = "verification"
role = "Visual/UX judge"
# Multimodal: screenshot → judge visual quality

[workers.verifier_engineer]
category = "verification"
subcategory = "engineering"
model = "minimax/minimax-m2-5"
squad = "verification"
role = "Logic/test/security reviewer"
# SWE-bench Verified 80.2% | $0.12/M

# ─────────────────────────────────────
# DEEPSEEK CONTEXT POOL
# ─────────────────────────────────────

[pool]
model = "deepseek/deepseek-v3-2"
instances = 3
queue_type = "fifo"
# LiveCodeBench 83.3% | $0.28/M
# Context caching $0.028/M repeated prefixes

# ─────────────────────────────────────
# 🟧 SUPPORT — 6 SPESIALISASI
# Debugger: Root cause (Grok 3)
# Scout: Research (Gemini 2.5 Pro)
# Auditor: Architecture review (Claude Sonnet)
# Scribe: Documentation (DeepSeek V4 Flash)
# Summarizer: Compression (DeepSeek V4 Flash)
# Sentinel: Error logging (Ollama — lokal/gratis)
# ─────────────────────────────────────

[workers.debugger]
category = "support"
subcategory = "debugging"
model = "deepseek/deepseek-v3-2"
squad = "support"
role = "Root cause analysis"
# Debugging = banyak iterasi → needs cheap

[workers.scout]
category = "support"
subcategory = "research"
model = "google/gemini-2-5-pro"
squad = "support"
role = "Research, real-time search"
# Real-time search | 1M+ context

[workers.auditor]
category = "support"
subcategory = "review"
model = "anthropic/claude-sonnet-4-6"
squad = "support"
role = "Code review, nuance"
# Architectural reasoning

[workers.scribe]
category = "support"
subcategory = "documentation"
model = "deepseek/deepseek-v4-flash"
squad = "support"
role = "Documentation"
# Long context | cheap | docs don't need frontier

[workers.summarizer]
category = "support"
subcategory = "compression"
model = "deepseek/deepseek-v4-flash"
squad = "support"
role = "Long context compression"
# 1M context | compress long histories

[workers.sentinel]
category = "support"
subcategory = "monitoring"
model = "ollama/llama3"
squad = "support"
role = "Error logging"
# Logging only — local/free

# ─────────────────────────────────────
# PROVIDERS — credentials from env vars
# ─────────────────────────────────────

[providers.anthropic]
api_key = "${ANTHROPIC_API_KEY}"

[providers.google]
api_key = "${GOOGLE_API_KEY}"

[providers.minimax]
api_key = "${MINIMAX_API_KEY}"

[providers.deepseek]
api_key = "${DEEPSEEK_API_KEY}"

[providers.ollama]
base_url = "http://localhost:11434/v1"

# ─────────────────────────────────────
# MEMORY — Three-Ring System
# ─────────────────────────────────────

[memory]
ring1_path = "data/ring1.duckdb"
ring2_path = "data/ring2.db"
ring3_enabled = false
ring3_path = "data/ring3"

# ─────────────────────────────────────
# SERVER
# ─────────────────────────────────────

[server]
host = "0.0.0.0"
port = 8000
